<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#162D49" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>AB Renov — Tâches</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
/* ═══════════════════════════════════════════════
   AB RENOV — TASKFLOW
   Charte graphique : Marine #162D49 / Crème #F3EAE2
   ═══════════════════════════════════════════════ */

:root {
  --navy:      #162D49;
  --navy2:     #0C2731;
  --cream:     #F3EAE2;
  --sand:      #E0D5CA;
  --sand2:     #cfc5b8;
  --white:     #FFFFFF;
  --txt:       #162D49;
  --txt2:      #4a6070;
  --txt3:      #9aabb5;
  --pn:        #4a7fa5;
  --ph:        #c07b30;
  --pu:        #b03a2e;
  --green:     #3d8b5e;
  --wa:        #25D366;
  --wa2:       rgba(37,211,102,.1);
  --wa-border: rgba(37,211,102,.32);
  --radius:    9px;
  --tr:        .16s cubic-bezier(.4,0,.2,1);
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { -webkit-text-size-adjust: 100%; }

body {
  font-family: 'Jost', sans-serif;
  background: var(--cream);
  color: var(--txt);
  min-height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  -webkit-font-smoothing: antialiased;
}

#app {
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
  padding-bottom: calc(20px + var(--safe-bottom));
}

/* ── HEADER ── */
.hdr {
  position: sticky; top: 0; z-index: 50;
  background: var(--navy);
  padding: calc(var(--safe-top) + 14px) 16px 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.hdr-logo { font-size: 1.4rem; font-weight: 800; color: var(--white); letter-spacing: .12em; line-height: 1; }
.hdr-sub  { font-size: .5rem; font-weight: 500; color: rgba(255,255,255,.45); letter-spacing: .2em; text-transform: uppercase; margin-top: 3px; }
.hdr-right { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
.ctr-val   { font-size: 1.5rem; font-weight: 700; color: var(--white); line-height: 1; }
.ctr-label { font-size: .52rem; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.45); }
.rule { height: 3px; background: linear-gradient(90deg, var(--ph) 0%, var(--ph) 50px, transparent 50px); flex-shrink: 0; }

/* ── SAISIE ── */
.inp-sec {
  padding: 10px 12px 9px;
  display: flex; flex-direction: column; gap: 7px;
  background: var(--cream);
}
.inp-line { display: flex; gap: 7px; align-items: center; }
.inp-wrap {
  flex: 1; display: flex; align-items: center;
  background: var(--white); border: 1.5px solid var(--sand);
  border-radius: var(--radius); padding: 0 12px;
  transition: border-color var(--tr);
}
.inp-wrap:focus-within { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(22,45,73,.07); }
#taskInput {
  flex: 1; background: none; border: none; outline: none;
  color: var(--txt); font-family: 'Jost', sans-serif;
  font-size: .9rem; font-weight: 400; padding: 12px 0; caret-color: var(--navy);
}
#taskInput::placeholder { color: var(--txt3); font-weight: 300; }

/* Priorité pills */
.prio-pills { display: flex; gap: 4px; flex-shrink: 0; }
.pp {
  display: flex; align-items: center; gap: 4px;
  padding: 0 8px; height: 36px; border-radius: 7px;
  border: 1.5px solid var(--sand); background: var(--white);
  cursor: pointer; transition: all var(--tr);
  font-family: 'Jost', sans-serif;
  -webkit-user-select: none; user-select: none;
}
.pp:active { transform: scale(.93); }
.pp-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.pn { background: var(--pn); }
.ph { background: var(--ph); }
.pu { background: var(--pu); }
.pp-txt { font-size: .62rem; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--txt3); transition: color var(--tr); }

.pp[data-priority="normal"].active  { border-color: var(--pn); background: rgba(74,127,165,.07); }
.pp[data-priority="normal"].active .pp-txt { color: var(--pn); }
.pp[data-priority="high"].active    { border-color: var(--ph); background: rgba(192,123,48,.07); }
.pp[data-priority="high"].active .pp-txt   { color: var(--ph); }
.pp[data-priority="urgent"].active  { border-color: var(--pu); background: rgba(176,58,46,.06); }
.pp[data-priority="urgent"].active .pp-txt { color: var(--pu); }

/* ── OPTION ALERTE DANS LA SAISIE ── */
.inp-alert-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 4px;
  cursor: pointer;
  -webkit-user-select: none;
  user-select: none;
}

/* Checkbox custom */
.chk-box {
  width: 18px; height: 18px;
  border: 1.5px solid var(--sand2);
  border-radius: 4px;
  background: var(--white);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all var(--tr);
}
.chk-box svg { display: none; }
.inp-alert-toggle.checked .chk-box {
  background: var(--wa);
  border-color: var(--wa);
}
.inp-alert-toggle.checked .chk-box svg { display: block; }
.chk-label {
  font-size: .67rem; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  color: var(--txt3);
  transition: color var(--tr);
  white-space: nowrap;
}
.inp-alert-toggle.checked .chk-label { color: var(--wa); }

/* Champ date/heure de la tâche dans la zone de saisie */
.inp-alert-dt {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 0 2px;
}
.inp-alert-dt.visible { display: flex; }
.inp-alert-dt input[type="datetime-local"] {
  flex: 1;
  background: var(--white);
  border: 1.5px solid var(--wa-border);
  border-radius: 6px;
  padding: 8px 10px;
  font-family: 'Jost', sans-serif;
  font-size: .8rem;
  color: var(--txt);
  outline: none;
  cursor: pointer;
  transition: border-color var(--tr);
  width: 100%;
}
.inp-alert-dt input[type="datetime-local"]:focus { border-color: var(--wa); }
.inp-alert-hint {
  font-size: .6rem; color: var(--txt3); font-weight: 500;
  letter-spacing: .06em; white-space: nowrap;
  flex-shrink: 0;
}

/* Bouton Ajouter */
.add-btn {
  width: 100%; display: flex; align-items: center; justify-content: center; gap: 7px;
  background: var(--navy); color: var(--white);
  border: none; border-radius: var(--radius); padding: 13px;
  font-family: 'Jost', sans-serif; font-size: .78rem; font-weight: 700;
  letter-spacing: .16em; text-transform: uppercase; cursor: pointer; transition: all var(--tr);
}
.add-btn:active { background: var(--navy2); transform: scale(.98); }

/* ── SÉPARATEUR ── */
.divider { height: 1px; background: var(--sand); flex-shrink: 0; }

/* ── ONGLETS ── */
.tabs { display: flex; background: var(--cream); flex-shrink: 0; }
.tab {
  flex: 1; padding: 9px 0; text-align: center;
  font-family: 'Jost', sans-serif; font-size: .68rem; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase; color: var(--txt3);
  border: none; background: none; border-bottom: 2px solid transparent;
  cursor: pointer; transition: all var(--tr);
  -webkit-user-select: none; user-select: none;
}
.tab.active { color: var(--navy); border-bottom-color: var(--navy); }
.tab.tab-arch.active { color: var(--green); border-bottom-color: var(--green); }
.tab-badge {
  display: inline-block; background: var(--navy); color: var(--white);
  font-size: .55rem; font-weight: 700; border-radius: 10px;
  padding: 1px 6px; margin-left: 4px; vertical-align: middle;
}
.tab-arch .tab-badge,
.tab-arch.active .tab-badge { background: var(--green); }

/* ── SYNC BAR ── */
.sync-bar { display: flex; justify-content: flex-end; align-items: center; gap: 5px; padding: 5px 14px 4px; background: var(--cream); }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; transition: background var(--tr); }
.sync-dot.syncing { background: var(--ph); animation: pulse 1s infinite; }
.sync-dot.error   { background: var(--pu); }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
.sync-txt { font-size: .62rem; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; color: var(--txt3); }

/* ── PANELS ── */
.panel { padding: 8px 12px 4px; flex: 1; overflow-y: auto; }
.panel::-webkit-scrollbar { width: 3px; }
.panel::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 2px; }

.empty { display: flex; flex-direction: column; align-items: center; padding: 32px 20px; text-align: center; gap: 7px; }
.empty p { font-size: .8rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--txt3); }
.empty span { font-size: .75rem; color: var(--txt3); font-weight: 300; }
.arch-empty { text-align: center; padding: 28px 20px; font-size: .78rem; color: var(--txt3); font-weight: 500; }

/* ── LISTE ── */
.task-list { list-style: none; display: flex; flex-direction: column; gap: 7px; padding-bottom: 10px; }

/* ── CARTE TÂCHE ── */
.task-item {
  background: var(--white);
  border: 1px solid var(--sand);
  border-left: 3px solid var(--pn);
  border-radius: var(--radius);
  padding: 10px 10px 10px 12px;
  display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
  animation: slideIn .2s ease both;
}
@keyframes slideIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: none; } }
.task-item[data-priority="high"]   { border-left-color: var(--ph); }
.task-item[data-priority="urgent"] { border-left-color: var(--pu); }

.task-text { flex: 1; font-size: .88rem; font-weight: 500; line-height: 1.35; color: var(--txt); word-break: break-word; }

.task-badge { font-size: .56rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; padding: 2px 5px; border-radius: 3px; flex-shrink: 0; display: none; }
.task-item[data-priority="high"] .task-badge   { display: block; color: var(--ph); background: rgba(192,123,48,.1); }
.task-item[data-priority="urgent"] .task-badge { display: block; color: var(--pu); background: rgba(176,58,46,.08); }

.task-actions { display: flex; gap: 3px; flex-shrink: 0; }

.btn-fait {
  height: 30px; padding: 0 10px;
  border: 1.5px solid rgba(61,139,94,.3); border-radius: 6px;
  background: rgba(61,139,94,.07); color: var(--green);
  cursor: pointer; display: flex; align-items: center; gap: 4px;
  font-family: 'Jost', sans-serif; font-size: .65rem; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase; transition: all var(--tr); white-space: nowrap;
}
.btn-fait:active { background: rgba(61,139,94,.18); transform: scale(.94); }

.task-btn {
  width: 30px; height: 30px;
  border: 1px solid var(--sand); border-radius: 6px;
  background: var(--cream); color: var(--txt2);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all var(--tr);
}
.task-btn:active { transform: scale(.86); background: var(--sand); }

@keyframes archiveOut { 0% { opacity:1; transform:translateX(0); } 20% { background:rgba(61,139,94,.09); } 100% { opacity:0; transform:translateX(55px); } }
.task-item.archiving { animation: archiveOut .3s ease forwards; pointer-events: none; }
.task-item.removing  { transition: opacity .18s, transform .18s; opacity: 0; transform: translateX(-35px); }

/* ── BLOC ALERTE SUR LA CARTE (sous la tâche) ── */
.task-alert-block {
  width: 100%;
  margin-top: 8px;
  padding: 9px 10px;
  border-top: 1px dashed var(--sand);
  display: flex;
  flex-direction: column;
  gap: 7px;
}

/* Ligne date échéance */
.ta-date-row {
  display: flex;
  align-items: center;
  gap: 8px;
}

.ta-icon { font-size: .8rem; flex-shrink: 0; }

.ta-date-info { flex: 1; min-width: 0; }

.ta-date-val {
  font-size: .78rem;
  font-weight: 700;
  color: var(--navy);
}

.ta-date-sub {
  font-size: .6rem;
  color: var(--txt3);
  margin-top: 1px;
}

/* Pills statut des 2 alertes */
.ta-pills {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}

.ta-pill {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 5px;
  font-size: .58rem;
  font-weight: 700;
  letter-spacing: .06em;
  text-transform: uppercase;
  border: 1px solid var(--sand);
  background: var(--cream);
  color: var(--txt3);
  white-space: nowrap;
}

.ta-pill.sent {
  border-color: var(--wa-border);
  background: var(--wa2);
  color: var(--wa);
}

.ta-pill.pending {
  border-color: rgba(192,123,48,.3);
  background: rgba(192,123,48,.07);
  color: var(--ph);
}

.ta-pill-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}

/* Bouton supprimer alerte */
.btn-del-alert {
  height: 24px; padding: 0 8px;
  border: 1px solid var(--sand); border-radius: 4px;
  background: none; color: var(--txt3);
  font-family: 'Jost', sans-serif; font-size: .58rem; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase;
  cursor: pointer; transition: all var(--tr); flex-shrink: 0;
}
.btn-del-alert:active { background: var(--sand); }

/* ── CARTE ARCHIVE ── */
.arch-item {
  background: var(--white); border: 1px solid var(--sand);
  border-left: 3px solid #ccc; border-radius: var(--radius);
  padding: 9px 10px 9px 12px;
  display: flex; align-items: center; gap: 8px; opacity: .65;
}
.arch-item[data-priority="high"]   { border-left-color: rgba(192,123,48,.4); }
.arch-item[data-priority="urgent"] { border-left-color: rgba(176,58,46,.35); }
.arch-info { flex: 1; min-width: 0; }
.arch-text { font-size: .82rem; font-weight: 400; color: var(--txt2); text-decoration: line-through; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.arch-date { font-size: .6rem; color: var(--txt3); margin-top: 2px; }
.btn-reactivate {
  height: 28px; padding: 0 8px;
  border: 1px solid rgba(22,45,73,.2); border-radius: 5px;
  background: none; color: var(--navy); cursor: pointer;
  font-family: 'Jost', sans-serif; font-size: .6rem; font-weight: 700;
  letter-spacing: .07em; text-transform: uppercase; transition: all var(--tr); white-space: nowrap; flex-shrink: 0;
}
.btn-reactivate:active { background: rgba(22,45,73,.07); transform: scale(.94); }
.btn-del-arch {
  width: 26px; height: 26px; border: 1px solid var(--sand); border-radius: 5px;
  background: var(--cream); color: var(--txt3); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--tr); flex-shrink: 0;
}
.btn-del-arch:active { transform: scale(.86); }
.clr-all-btn {
  width: 100%; margin-top: 6px; padding: 10px; background: none;
  border: 1px solid rgba(176,58,46,.22); border-radius: var(--radius);
  color: var(--pu); font-family: 'Jost', sans-serif; font-size: .68rem;
  font-weight: 700; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; transition: all var(--tr);
}
.clr-all-btn:active { background: rgba(176,58,46,.06); }

/* ── MODALE ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(22,45,73,.55); z-index: 200;
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity .2s ease;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--white); border-top: 3px solid var(--navy);
  padding: 18px 16px calc(20px + var(--safe-bottom));
  width: 100%; max-width: 480px; margin: 0 auto;
  transform: translateY(20px); transition: transform .2s ease;
  display: flex; flex-direction: column; gap: 13px;
}
.modal-overlay.open .modal { transform: none; }
.modal-header { display: flex; align-items: center; justify-content: space-between; }
.modal-header h2 { font-size: .78rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--navy); }
.modal-close { width: 28px; height: 28px; border: 1px solid var(--sand); border-radius: 5px; background: var(--cream); color: var(--txt2); cursor: pointer; font-size: .8rem; display: flex; align-items: center; justify-content: center; }
.edit-input { background: var(--cream); border: 1.5px solid var(--sand); border-radius: var(--radius); padding: 11px 13px; color: var(--txt); font-family: 'Jost', sans-serif; font-size: .9rem; outline: none; width: 100%; caret-color: var(--navy); transition: border-color var(--tr); }
.edit-input:focus { border-color: var(--navy); background: var(--white); }
.modal-label { font-size: .62rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--txt3); display: block; margin-bottom: 6px; }
.mpills { display: flex; gap: 6px; }
.mpills .pp { flex: 1; justify-content: center; height: auto; padding: 9px 6px; }
.mpills .pp-txt { font-size: .65rem; }
.modal-actions { display: flex; gap: 8px; }
.btn-cancel, .btn-save { flex: 1; padding: 13px; border: none; border-radius: var(--radius); font-family: 'Jost', sans-serif; font-size: .78rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; transition: all var(--tr); }
.btn-cancel { background: var(--cream); color: var(--txt2); border: 1px solid var(--sand); }
.btn-save   { background: var(--navy); color: var(--white); }
.btn-save:active { background: var(--navy2); transform: scale(.98); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: calc(18px + var(--safe-bottom)); left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--navy); color: var(--white);
  font-family: 'Jost', sans-serif; font-size: .68rem; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  padding: 9px 18px; border-radius: 4px;
  opacity: 0; pointer-events: none; transition: all .2s ease;
  white-space: nowrap; z-index: 300;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── DESKTOP ── */
@media (min-width: 481px) {
  body { background: var(--sand); }
  #app { margin: 20px auto; border-radius: 18px; overflow: hidden; box-shadow: 0 8px 30px rgba(22,45,73,.18); min-height: auto; }
  .modal { border-radius: 16px 16px 0 0; }
}
  </style>
</head>
<body>

<div id="app">
  <header class="hdr">
    <div class="hdr-brand">
      <div class="hdr-logo">AB RENOV</div>
      <div class="hdr-sub">Aménagement &amp; Rénovation</div>
    </div>
    <div class="hdr-right">
      <span class="ctr-label">tâches</span>
      <span class="ctr-val" id="cnt">0</span>
    </div>
  </header>
  <div class="rule"></div>

  <!-- ── ZONE DE SAISIE ── -->
  <section class="inp-sec">
    <div class="inp-line">
      <div class="inp-wrap">
        <input type="text" id="taskInput" placeholder="Nouvelle tâche..." autocomplete="off" autocorrect="off" spellcheck="false" maxlength="120"/>
      </div>
      <div class="prio-pills" id="prioSelector">
        <button class="pp active" data-priority="normal" title="Normal"><span class="pp-dot pn"></span><span class="pp-txt">N</span></button>
        <button class="pp" data-priority="high"   title="Important"><span class="pp-dot ph"></span><span class="pp-txt">I</span></button>
        <button class="pp" data-priority="urgent" title="Urgent"><span class="pp-dot pu"></span><span class="pp-txt">U</span></button>
      </div>
    </div>

    <!-- Case à cocher alerte -->
    <div class="inp-alert-toggle" id="alertToggle" onclick="toggleNewAlert()">
      <div class="chk-box">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <span class="chk-label">📲 Alerte WhatsApp (−24h &amp; −1h)</span>
    </div>

    <!-- Champ date/heure de la tâche (visible si coché) -->
    <div class="inp-alert-dt" id="newAlertDt">
      <input type="datetime-local" id="newAlertInput" />
      <span class="inp-alert-hint">Échéance de la tâche</span>
    </div>

    <button class="add-btn" onclick="addTask()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Ajouter la tâche
    </button>
  </section>

  <div class="divider"></div>

  <div class="tabs">
    <button class="tab active" id="tab-tasks" onclick="switchTab('tasks')">Tâches <span class="tab-badge" id="badge-tasks">0</span></button>
    <button class="tab tab-arch" id="tab-arch"  onclick="switchTab('arch')">Archives <span class="tab-badge" id="badge-arch">0</span></button>
  </div>
  <div class="divider"></div>

  <div class="sync-bar">
    <span class="sync-dot" id="syncDot"></span>
    <span class="sync-txt" id="syncTxt">Synchronisé</span>
  </div>

  <main class="panel" id="panel-tasks">
    <div class="empty" id="emptyState">
      <p>Aucune tâche en cours</p>
      <span>Ajoutez votre première tâche ci-dessus</span>
    </div>
    <ul class="task-list" id="taskList"></ul>
  </main>

  <div class="panel" id="panel-arch" style="display:none">
    <div class="arch-empty" id="archEmpty">Aucune tâche archivée</div>
    <ul class="task-list" id="archList"></ul>
    <button class="clr-all-btn" id="clrAllBtn" onclick="clearAllArchives()" style="display:none">Vider toutes les archives</button>
  </div>
</div>

<!-- ── MODALE MODIFIER ── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2>Modifier la tâche</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <input type="text" id="editInput" class="edit-input" maxlength="120"/>
    <div>
      <span class="modal-label">Priorité</span>
      <div class="mpills" id="modalPrio">
        <button class="pp" data-priority="normal" onclick="setEditPriority('normal')"><span class="pp-dot pn"></span><span class="pp-txt">Normal</span></button>
        <button class="pp" data-priority="high"   onclick="setEditPriority('high')"><span class="pp-dot ph"></span><span class="pp-txt">Important</span></button>
        <button class="pp" data-priority="urgent" onclick="setEditPriority('urgent')"><span class="pp-dot pu"></span><span class="pp-txt">Urgent</span></button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-save"   onclick="saveEdit()">Enregistrer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════
   AB RENOV — TASKFLOW — APP.JS
   ═══════════════════════════════════════════════════════ */

const APPS_SCRIPT_URL   = "https://script.google.com/macros/s/AKfycbxlfbeQ0Xdd9bg24hJf5TPU8zbOMncvoVyORbnt2o4d9T-Pn6BKc2VmLgBbXJdCh-CT5Q/exec";
const USE_GOOGLE_SHEETS = true;

/* ── ÉTAT ── */
let tasks           = [];
let archived        = [];
let editingId       = null;
let editPriority    = 'normal';
let currentPriority = 'normal';
let currentTab      = 'tasks';
let newAlertEnabled = false;   // case cochée dans la saisie

/* ── INIT ── */
document.addEventListener('DOMContentLoaded', () => {
  loadFromLocalStorage();
  render();
  if (USE_GOOGLE_SHEETS) syncFromSheets();

  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addTask(); }
  });

  document.querySelectorAll('#prioSelector .pp').forEach(btn => {
    btn.addEventListener('click', () => {
      currentPriority = btn.dataset.priority;
      document.querySelectorAll('#prioSelector .pp').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && editingId) closeModal();
    if (e.key === 'Enter'  && editingId && document.activeElement === document.getElementById('editInput')) saveEdit();
  });

  // Valeur min = maintenant pour le datetime-local de saisie
  document.getElementById('newAlertInput').min = localDatetimeValue(new Date());
  document.getElementById('taskInput').focus();
});

/* ── TOGGLE ALERTE DANS LA SAISIE ── */
function toggleNewAlert() {
  newAlertEnabled = !newAlertEnabled;
  const toggle = document.getElementById('alertToggle');
  const dtRow  = document.getElementById('newAlertDt');
  toggle.classList.toggle('checked', newAlertEnabled);
  dtRow.classList.toggle('visible', newAlertEnabled);
  if (newAlertEnabled) {
    setTimeout(() => document.getElementById('newAlertInput').focus(), 80);
  }
}

/* ── ID ── */
function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

/* ── ONGLETS ── */
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-tasks').classList.toggle('active', tab === 'tasks');
  document.getElementById('tab-arch').classList.toggle('active',  tab === 'arch');
  document.getElementById('panel-tasks').style.display = tab === 'tasks' ? 'block' : 'none';
  document.getElementById('panel-arch').style.display  = tab === 'arch'  ? 'block' : 'none';
}

/* ── AJOUTER UNE TÂCHE ── */
function addTask() {
  const input = document.getElementById('taskInput');
  const text  = input.value.trim();

  if (!text) {
    const wrap = input.parentElement;
    wrap.style.borderColor = 'var(--pu)';
    setTimeout(() => wrap.style.borderColor = '', 600);
    return;
  }

  // Vérifier date si alerte cochée
  let alertAt = null;
  if (newAlertEnabled) {
    const dtVal = document.getElementById('newAlertInput').value;
    if (!dtVal) {
      const dtInp = document.getElementById('newAlertInput');
      dtInp.style.borderColor = 'var(--pu)';
      setTimeout(() => dtInp.style.borderColor = '', 600);
      showToast('Choisissez une date d\'échéance');
      return;
    }
    alertAt = new Date(dtVal).toISOString();
  }

  const task = {
    id:        generateId(),
    text,
    priority:  currentPriority,
    createdAt: new Date().toISOString(),
  };

  if (alertAt) {
    task.alertAt      = alertAt;   // date/heure de la tâche
    task.alert24sent  = false;     // alerte −24h envoyée ?
    task.alert1sent   = false;     // alerte −1h envoyée ?
  }

  tasks.unshift(task);
  input.value = '';

  // Reset alerte saisie
  if (newAlertEnabled) {
    newAlertEnabled = false;
    document.getElementById('alertToggle').classList.remove('checked');
    document.getElementById('newAlertDt').classList.remove('visible');
    document.getElementById('newAlertInput').value = '';
  }

  if (currentTab !== 'tasks') switchTab('tasks');
  saveAndRender('Tâche ajoutée');
  input.focus();
}

/* ── ARCHIVER ── */
function archiveTask(id) {
  const el = document.getElementById('task-' + id);
  if (!el) return;
  el.classList.add('archiving');
  setTimeout(() => {
    const task = tasks.find(t => t.id === id);
    if (task) archived.unshift({ ...task, archivedAt: new Date().toISOString() });
    tasks = tasks.filter(t => t.id !== id);
    saveAndRender('Archivée ✓');
  }, 300);
}

/* ── RÉACTIVER ── */
function reactivateTask(id) {
  const task = archived.find(t => t.id === id);
  if (!task) return;
  archived = archived.filter(t => t.id !== id);
  const { archivedAt, ...restored } = task;
  restored.createdAt = new Date().toISOString();
  tasks.unshift(restored);
  switchTab('tasks');
  saveAndRender('Réactivée !');
}

/* ── SUPPRIMER TÂCHE ACTIVE ── */
function deleteTask(id) {
  const el = document.getElementById('task-' + id);
  if (el) {
    el.classList.add('removing');
    setTimeout(() => {
      tasks = tasks.filter(t => t.id !== id);
      saveAndRender('Supprimée');
    }, 190);
  }
}

/* ── SUPPRIMER ARCHIVE ── */
function deleteArchive(id) { archived = archived.filter(t => t.id !== id); saveAndRender(); }
function clearAllArchives() { archived = []; saveAndRender('Archives vidées'); }

/* ── SUPPRIMER L'ALERTE D'UNE TÂCHE ── */
function removeTaskAlert(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  delete task.alertAt;
  delete task.alert24sent;
  delete task.alert1sent;
  saveAndRender('Alerte supprimée');
}

/* ── MODALE MODIFIER ── */
function openModal(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  editingId    = id;
  editPriority = task.priority;
  document.getElementById('editInput').value = task.text;
  document.querySelectorAll('#modalPrio .pp').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.priority === task.priority);
  });
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => { const ei = document.getElementById('editInput'); ei.focus(); ei.select(); }, 80);
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); editingId = null; }
function setEditPriority(p) {
  editPriority = p;
  document.querySelectorAll('#modalPrio .pp').forEach(btn => btn.classList.toggle('active', btn.dataset.priority === p));
}
function saveEdit() {
  const text = document.getElementById('editInput').value.trim();
  if (!text) return;
  const task = tasks.find(t => t.id === editingId);
  if (!task) return;
  task.text = text; task.priority = editPriority;
  closeModal(); saveAndRender('Modifiée');
}

/* ── RENDU ── */
function render() {
  document.getElementById('cnt').textContent         = tasks.length;
  document.getElementById('badge-tasks').textContent = tasks.length;
  document.getElementById('badge-arch').textContent  = archived.length;
  renderTasks();
  renderArchived();
  document.getElementById('panel-tasks').style.display = currentTab === 'tasks' ? 'block' : 'none';
  document.getElementById('panel-arch').style.display  = currentTab === 'arch'  ? 'block' : 'none';
}

function renderTasks() {
  const list  = document.getElementById('taskList');
  const empty = document.getElementById('emptyState');
  list.innerHTML = '';
  empty.style.display = tasks.length === 0 ? 'flex' : 'none';

  tasks.forEach(task => {
    const li = document.createElement('li');
    li.className = 'task-item';
    li.id        = 'task-' + task.id;
    li.dataset.priority = task.priority;

    const badge = task.priority === 'urgent' ? 'Urgent' : task.priority === 'high' ? 'Import.' : '';

    li.innerHTML = `
      <span class="task-text">${escapeHtml(task.text)}</span>
      <span class="task-badge">${badge}</span>
      <div class="task-actions">
        <button class="btn-fait" onclick="archiveTask('${task.id}')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
          Fait
        </button>
        <button class="task-btn" onclick="openModal('${task.id}')" title="Modifier">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4z"/></svg>
        </button>
        <button class="task-btn" onclick="deleteTask('${task.id}')" title="Supprimer">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
        </button>
      </div>
      ${task.alertAt ? renderAlertBlock(task) : ''}
    `;
    list.appendChild(li);
  });
}

function renderAlertBlock(task) {
  const d = new Date(task.alertAt);
  const dateStr = d.toLocaleDateString('fr-FR', { weekday:'short', day:'2-digit', month:'short' });
  const timeStr = d.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });

  const pill24 = task.alert24sent
    ? `<span class="ta-pill sent"><span class="ta-pill-dot"></span>−24h ✓</span>`
    : `<span class="ta-pill pending"><span class="ta-pill-dot"></span>−24h en attente</span>`;

  const pill1 = task.alert1sent
    ? `<span class="ta-pill sent"><span class="ta-pill-dot"></span>−1h ✓</span>`
    : `<span class="ta-pill pending"><span class="ta-pill-dot"></span>−1h en attente</span>`;

  return `
    <div class="task-alert-block">
      <div class="ta-date-row">
        <span class="ta-icon">📅</span>
        <div class="ta-date-info">
          <div class="ta-date-val">${dateStr} à ${timeStr}</div>
          <div class="ta-date-sub">Échéance — alertes WhatsApp programmées</div>
        </div>
        <button class="btn-del-alert" onclick="removeTaskAlert('${task.id}')">✕ Alerte</button>
      </div>
      <div class="ta-pills">
        ${pill24}
        ${pill1}
      </div>
    </div>
  `;
}

function renderArchived() {
  const list   = document.getElementById('archList');
  const empty  = document.getElementById('archEmpty');
  const clrBtn = document.getElementById('clrAllBtn');
  list.innerHTML = '';
  empty.style.display  = archived.length === 0 ? 'block' : 'none';
  clrBtn.style.display = archived.length > 0   ? 'block' : 'none';

  archived.forEach(task => {
    const li = document.createElement('li');
    li.className = 'arch-item';
    li.dataset.priority = task.priority;
    li.innerHTML = `
      <div class="arch-info">
        <div class="arch-text">${escapeHtml(task.text)}</div>
        <div class="arch-date">Archivé le ${formatDate(task.archivedAt)}</div>
      </div>
      <button class="btn-reactivate" onclick="reactivateTask('${task.id}')">↩ Réactiver</button>
      <button class="btn-del-arch"   onclick="deleteArchive('${task.id}')" title="Supprimer">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    `;
    list.appendChild(li);
  });
}

/* ── UTILITAIRES ── */
function escapeHtml(str) {
  const div = document.createElement('div');
  div.appendChild(document.createTextNode(str));
  return div.innerHTML;
}
function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' });
}
function localDatetimeValue(date) {
  const pad = n => String(n).padStart(2, '0');
  return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

let toastTimer;
function showToast(msg) {
  if (!msg) return;
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

/* ── SAVE & RENDER ── */
function saveAndRender(toastMsg = '') {
  saveToLocalStorage();
  render();
  if (toastMsg) showToast(toastMsg);
  if (USE_GOOGLE_SHEETS) syncToSheets();
}

/* ── LOCALSTORAGE ── */
function saveToLocalStorage() {
  try {
    localStorage.setItem('abrenov_tasks',    JSON.stringify(tasks));
    localStorage.setItem('abrenov_archived', JSON.stringify(archived));
  } catch(e) {}
}
function loadFromLocalStorage() {
  try {
    const t = localStorage.getItem('abrenov_tasks');
    const a = localStorage.getItem('abrenov_archived');
    if (t) tasks    = JSON.parse(t);
    if (a) archived = JSON.parse(a);
  } catch(e) { tasks = []; archived = []; }
}

/* ── SYNC GOOGLE SHEETS ── */
function setSyncStatus(s) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncTxt');
  if (s === 'syncing') { dot.className = 'sync-dot syncing'; txt.textContent = 'Synchronisation…'; }
  else if (s === 'ok') { dot.className = 'sync-dot';         txt.textContent = 'Synchronisé'; }
  else                 { dot.className = 'sync-dot error';   txt.textContent = 'Erreur sync'; }
}
async function syncToSheets() {
  if (!USE_GOOGLE_SHEETS) return;
  setSyncStatus('syncing');
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'saveTasks', tasks, archived })
    });
    setSyncStatus('ok');
  } catch(e) { setSyncStatus('error'); }
}
async function syncFromSheets() {
  if (!USE_GOOGLE_SHEETS) return;
  setSyncStatus('syncing');
  try {
    const res  = await fetch(APPS_SCRIPT_URL + '?action=getTasks');
    const data = await res.json();
    if (data.tasks)    tasks    = data.tasks;
    if (data.archived) archived = data.archived;
    saveToLocalStorage();
    render();
    setSyncStatus('ok');
  } catch(e) { setSyncStatus('error'); }
}
</script>
</body>
</html>
